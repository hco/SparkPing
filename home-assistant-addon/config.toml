[server]
host = "0.0.0.0"
port = 8080
# Restrict access to only Home Assistant ingress IP (172.30.32.2) for security
home_assistant_ingress_only = true

[logging]
level = "info"
file = "/data/sparkping.log"

[database]
path = "/data/tsink-data"

[ping]
# Use dgram sockets (unprivileged ICMP) - more reliable in containers
socket_type = "dgram"

# Add ping targets through the web UI or edit this file
# Example:
# [[targets]]
# address = "8.8.8.8"
# name = "Google DNS"
# ping_count = 3
# ping_interval = 5
# id = "generated-uuid"

